name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# 取消同分支上仍在运行的旧 CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # —— 跨平台构建 + 单元测试 ——
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel
      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

  # —— AddressSanitizer + UBSan ——
  sanitizers:
    name: sanitizers (asan+ubsan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        # OpenMP 关闭以避免 ASan 与线程运行时的误报
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DLQCS_ENABLE_SANITIZERS=ON -DLQCS_ENABLE_OPENMP=OFF
          -DLQCS_BUILD_BENCHMARKS=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

  # —— 标量回退路径（无 AVX2）——
  scalar-fallback:
    name: scalar (no AVX2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLQCS_ENABLE_AVX2=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # —— Python 绑定 + pytest ——
  python:
    name: python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pytest
          pip install . -v
      - name: Test
        run: pytest tests/python -q

  # —— 代码格式检查 ——
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          shopt -s globstar
          clang-format --dry-run --Werror \
            include/**/*.hpp src/**/*.cpp src/**/*.hpp \
            examples/*.cpp tests/*.cpp benchmarks/*.cpp python/src/*.cpp
